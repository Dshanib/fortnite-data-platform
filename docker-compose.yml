# Local Phase 1 infrastructure. Credentials come from .env only (never commit .env).
# Usage: docker compose --env-file .env up -d
#
# Kafka only:  docker compose --env-file .env up -d zookeeper kafka
# MinIO only:  docker compose --env-file .env up -d minio minio-init

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fortnite-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      # Local dev: localhost:2181
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fortnite-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      # Local dev: host clients use localhost:9092
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # PLAINTEXT_HOST advertises localhost:9092 for apps on the host machine.
      # For LAN/external clients, change PLAINTEXT_HOST to your host IP, e.g.:
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://192.168.1.100:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  minio:
    image: minio/minio:latest
    container_name: fortnite-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: fortnite-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set fortnite http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb fortnite/$$MINIO_BUCKET --ignore-existing &&
      echo MinIO bucket ready
      "
  kafdrop:
    image: obsidiandynamics/kafdrop:3.30.0
    container_name: fortnite-kafdrop
    restart: unless-stopped
    ports:
      - "9003:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    depends_on:
      - kafka

volumes:
  minio_data:
