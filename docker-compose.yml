# Local Phase 1 infrastructure. Credentials come from .env only (never commit .env).
#
# Core stack (Kafka, MinIO):
#   docker compose --env-file .env up -d
#
# Add Airflow (scheduler + UI on :8080):
#   docker compose --env-file .env --profile airflow up -d
#
# Airflow only (after core is up):
#   docker compose --env-file .env --profile airflow up -d airflow-postgres airflow-init airflow-webserver airflow-scheduler

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    FORTNITE_PROJECT_ROOT: /opt/airflow/project
    PYTHONPATH: /opt/airflow/project
    # In-container DNS (override host localhost from .env)
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    MINIO_ENDPOINT: http://minio:9000
    FORTNITE_MAX_ISLANDS: ${FORTNITE_MAX_ISLANDS:-50}
    FORTNITE_SERVING_MODE: ${FORTNITE_SERVING_MODE:-direct_minio}
    FORTNITE_MAX_MESSAGES_PER_TOPIC: ${FORTNITE_MAX_MESSAGES_PER_TOPIC:-20}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./:/opt/airflow/project
  # root user avoids bind-mount permission issues on Windows / OneDrive paths
  user: "${AIRFLOW_UID:-0}:0"
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fortnite-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fortnite-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

  minio:
    image: minio/minio:latest
    container_name: fortnite-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: fortnite-minio-init
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set fortnite http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb fortnite/$$MINIO_BUCKET --ignore-existing &&
      echo MinIO bucket ready
      "

  kafdrop:
    image: obsidiandynamics/kafdrop:3.30.0
    container_name: fortnite-kafdrop
    restart: unless-stopped
    profiles: ["ui"]
    ports:
      - "9003:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    depends_on:
      - kafka

  # postgres:13 is widely cached; avoids failed pulls of postgres:16 on slow networks
  airflow-postgres:
    image: postgres:13
    container_name: fortnite-airflow-postgres
    profiles: ["airflow"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  airflow-init:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: fortnite-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "Airflow init: migrate DB and create admin user..."
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com 2>/dev/null \
          || echo "Admin user already exists (ok)"
        airflow db check
        echo "Airflow init: done"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    depends_on:
      airflow-postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: fortnite-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    profiles: ["airflow"]
    container_name: fortnite-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  airflow_postgres_data:
